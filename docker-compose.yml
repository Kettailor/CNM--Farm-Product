name: cnm-farm-product-traceability

services:
  app:
    image: cnm-farm-product-traceability-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmhub-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://farmhub:farmhub@db:5432/farmhub
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: cnm-farm-product-traceability-db
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:16-alpine
    container_name: farmhub-db
    environment:
      POSTGRES_DB: farmhub
      POSTGRES_USER: farmhub
      POSTGRES_PASSWORD: farmhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/database/farm_traceability_schema.sql:/docker-entrypoint-initdb.d/01_farm_traceability_schema.sql:ro
      - ./docs/database/02_seed_map_data.sql:/docker-entrypoint-initdb.d/02_seed_map_data.sql:ro
      - ./scripts/hop_nhat_toan_he_thong_vao_du_lieu.sql:/docker-entrypoint-initdb.d/03_hop_nhat_toan_he_thong_vao_du_lieu.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmhub -d farmhub"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: farmhub-adminer
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
