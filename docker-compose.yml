name: cnm-farm-product-traceability

services:
  app:
    image: cnm-farm-product-traceability-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmhub-app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm ci && mkdir -p .next && rm -rf .next/* .next/.[!.]* .next/..?* && npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next_cache:/app/.next
    environment:
      NODE_ENV: development
      PORT: 3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: postgresql://farmhub:farmhub@db:5432/farmhub
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  db:
    image: cnm-farm-product-traceability-db
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:16-alpine
    container_name: farmhub-db
    environment:
      POSTGRES_DB: farmhub
      POSTGRES_USER: farmhub
      POSTGRES_PASSWORD: farmhub
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/FarmHub_schema.sql:/docker-entrypoint-initdb.d/00_FarmHub_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmhub -d farmhub"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: farmhub-adminer
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: farmhub-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  app_node_modules:
  app_next_cache:
