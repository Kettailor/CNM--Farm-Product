name: Feature request
description: Đề xuất tính năng hoặc cải tiến.
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: textarea
    id: problem
    attributes:
      label: Vấn đề cần giải quyết
      description: Tính năng này giúp người dùng làm gì tốt hơn?
      placeholder: Người quản lý trang trại cần...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Đề xuất
      description: Mô tả hành vi hoặc giao diện mong muốn.
      placeholder: Thêm...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Tiêu chí hoàn thành
      placeholder: |
        - Người dùng có thể...
        - Dữ liệu được lưu...
        - CI vẫn xanh...
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Ưu tiên
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
