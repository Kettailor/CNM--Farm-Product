name: Bug report
description: Báo lỗi hoặc regression trong ứng dụng.
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: Cảm ơn bạn đã ghi nhận lỗi. Hãy mô tả đủ thông tin để tái hiện.
  - type: textarea
    id: summary
    attributes:
      label: Mô tả lỗi
      description: Điều gì đang xảy ra?
      placeholder: Khi tôi..., hệ thống...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Các bước tái hiện
      placeholder: |
        1. Vào trang...
        2. Bấm...
        3. Quan sát...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Kết quả mong đợi
      placeholder: Hệ thống nên...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Kết quả thực tế
      placeholder: Hệ thống hiện đang...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Khu vực ảnh hưởng
      options:
        - Frontend/UI
        - API/business logic
        - Database/schema
        - Docker/CI/CD
        - Documentation
        - Không chắc
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Môi trường
      placeholder: Local Docker, local npm, staging, production...
  - type: textarea
    id: logs
    attributes:
      label: Log hoặc ảnh chụp màn hình
      render: shell
