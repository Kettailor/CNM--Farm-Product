name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: farmhub
          POSTGRES_USER: farmhub
          POSTGRES_PASSWORD: farmhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U farmhub -d farmhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://farmhub:farmhub@localhost:5432/farmhub
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: KetKat-EcoFarm
      AUTH_SECRET: ci-auth-secret-change-in-production
      NEXTAUTH_SECRET: ci-auth-secret-change-in-production
      CRON_SECRET: ci-cron-secret
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_STARTTLS: "true"
      SMTP_USER: no-reply@example.com
      SMTP_PASS: change-me
      MAIL_FROM: KetKat-EcoFarm <no-reply@example.com>

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y postgresql-client

      - name: Initialize database schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/FarmHub_schema.sql

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: cnm-farm-product-traceability:ci
